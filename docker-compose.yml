name: steuerrechner

services:
  steuerrechner:
    build:
      context: .
    image: steuerrechner:latest
    restart: unless-stopped
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "${STEUERRECHNER_BIND:-127.0.0.1}:${STEUERRECHNER_PORT:-8501}:8501"
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: "${CADDY_NETWORK:-caddy}"
