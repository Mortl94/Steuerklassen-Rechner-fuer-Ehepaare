name: steuerrechner-caddy-example

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      STEUERRECHNER_DOMAIN: "${STEUERRECHNER_DOMAIN:-steuerklassen-rechner.de}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: "${CADDY_NETWORK:-caddy}"

volumes:
  caddy_data:
  caddy_config:
